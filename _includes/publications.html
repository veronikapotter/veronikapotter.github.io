<div class="row g-5 mb-5">
  <div>
    <h3 class="fw-bold border-bottom pb-3 mb-5">Publications</h3>
    {% if page.title == "Home" %}
      {% for paper in site.data.publications.featured %}
          {{ paper.title }}
          <a href="{{ paper.pdf_url }}" class="pdf-link">[pdf]</a>
          <a href="{{ paper.link_url }}" class="external-link">[link]</a>
      {% endfor %}
    {% else %}
      {% for paper in site.data.publications.index %}
          {{ paper.title }}
          <a href="{{ paper.pdf_url }}" class="pdf-link">[pdf]</a>
          <a href="{{ paper.link_url }}" class="external-link">[link]</a>
      {% endfor %}
    {% endif %}
  </div>
</div>
